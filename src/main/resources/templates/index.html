<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>URL Shortener</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: #fff;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #444;
        }

        h2 {
            margin: 20px 0 10px;
            color: #555;
        }

        label {
            font-size: 14px;
            margin-bottom: 5px;
            display: block;
        }

        input {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 5px rgba(102,126,234,0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 6px;
            background: #667eea;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #e6fffa;
            border: 1px solid #b2f5ea;
        }

        .error {
            background: #ffe6e6;
            border: 1px solid #ffb3b3;
            color: #cc0000;
        }

        a {
            color: #4c51bf;
            font-weight: 500;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        hr {
            margin: 30px 0;
            border: none;
            border-top: 1px solid #ddd;
        }

        .section {
            margin-top: 20px;
        }

        .small {
            font-size: 13px;
            color: #777;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>🔗 URL Shortener</h1>

    <!-- SHORTEN FORM -->
    <form th:action="@{/shorten-web}" method="POST">

        <label>Enter Long URL</label>
        <input type="text" name="longUrl" placeholder="https://example.com/very/long/url" required>

        <label>Custom Alias (Optional)</label>
        <input type="text" name="customAlias" placeholder="e.g. my-event">

        <label>Expiry Time (Hours - Optional)</label>
        <input type="number" name="expiry" min="0" placeholder="e.g. 24">

        <button type="submit">Shorten URL 🚀</button>
    </form>

    <!-- SUCCESS RESULT -->
    <div class="result" th:if="${shortUrlResult != null}">
        <h2>✅ Success</h2>
        <p><strong>Original:</strong> <span th:text="${originalUrl}"></span></p>
        <p>
            <strong>Short:</strong>
            <a th:href="${shortUrlResult}" th:text="${shortUrlResult}" target="_blank"></a>
        </p>
    </div>

    <!-- ALIAS ERROR -->
    <div class="result error" th:if="${aliasError != null}">
        <p th:text="${aliasError}"></p>
    </div>

    <hr>

    <!-- STATS SECTION -->
    <div class="section">
        <h2>📊 Check Link Statistics</h2>

        <form th:action="@{/check-stats}" method="POST">
            <label>Enter Short Code</label>
            <input type="text" name="checkShortCode" placeholder="e.g. aB1cDe" required>

            <button type="submit">Check Stats</button>
        </form>
    </div>

    <!-- STATS RESULT -->
    <div class="result" th:if="${urlStats != null}">
        <h3>📈 Statistics</h3>
        <p><strong>Original URL:</strong> <span th:text="${urlStats.originalUrl}"></span></p>
        <p><strong>Short URL:</strong>
            <a th:href="${urlStats.shortUrl}" th:text="${urlStats.shortUrl}" target="_blank"></a>
        </p>
        <p><strong>Created On:</strong>
            <span th:text="${#temporals.format(urlStats.creationDate, 'dd-MMM-yyyy HH:mm')}"></span>
        </p>
        <p><strong>Total Clicks:</strong>
            <span th:text="${urlStats.clickCount}"></span>
        </p>
    </div>

    <!-- STATS ERROR -->
    <div class="result error" th:if="${statsError != null}">
        <p th:text="${statsError}"></p>
    </div>

</div>

</body>
</html>
